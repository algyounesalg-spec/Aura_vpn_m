name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Extract Project
        run: |
          unzip "aura vpn m.zip"
          # This command lists files to see the correct folder name
          ls -R
          
      - name: Build APK
        run: |
          # Use wildcards to enter the correct directory automatically
          cd "aura vpn m" || cd "my-app" || cd */
          npm install
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-vpn-final
          path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
