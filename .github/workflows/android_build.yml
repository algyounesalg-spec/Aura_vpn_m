name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Extract Project
        run: |
          unzip "aura vpn m.zip"
          # Assuming extraction creates 'my-app' directory
          cd my-app

      - name: Build APK
        run: |
          cd my-app
          npm install
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-vpn-final
          path: my-app/android/app/build/outputs/apk/debug/aura vpn m.apk

